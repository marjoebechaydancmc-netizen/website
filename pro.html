<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - Trendy Threads</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="admin_db.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
}

.header {
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    padding: 20px;
    text-align: center;
    position: relative;
}

.header h1 { font-size: 1.8em; }

.back-btn {
    position: absolute;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    padding: 8px 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    transition: 0.3s;
}

.back-btn:hover {
    background: white;
    color: #ff7e5f;
    border-color: white;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 20px;
}

/* Empty state */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.empty-state i {
    font-size: 60px;
    color: #ddd;
    margin-bottom: 15px;
    display: block;
}

.empty-state p {
    font-size: 1.1em;
    color: #888;
    margin-bottom: 20px;
}

.empty-state a {
    display: inline-block;
    padding: 12px 30px;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 600;
    transition: 0.3s;
}

.empty-state a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,126,95,0.3); }

/* Order card */
.order-card {
    background: white;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    overflow: hidden;
    transition: 0.3s;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.order-card:hover {
    box-shadow: 0 6px 25px rgba(0,0,0,0.12);
}

.order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;
    background: #fafafa;
    border-bottom: 1px solid #f0f0f0;
    flex-wrap: wrap;
    gap: 10px;
}

.order-id {
    font-weight: 700;
    color: #333;
    font-size: 15px;
}

.order-date {
    color: #999;
    font-size: 13px;
    margin-top: 3px;
}

.order-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 13px;
    color: white;
}

/* Progress bar */
.progress-bar-container {
    padding: 15px 20px;
    background: #fafafa;
}

.progress-bar {
    height: 6px;
    background: #e8e8e8;
    border-radius: 3px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
}

.progress-steps {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: #bbb;
}

.progress-steps span.active {
    color: #ff7e5f;
    font-weight: 600;
}

/* Order items */
.order-items {
    padding: 15px 20px;
}

.order-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #f5f5f5;
}

.order-item:last-child { border-bottom: none; }

.order-item img {
    width: 55px;
    height: 55px;
    border-radius: 8px;
    object-fit: cover;
    background: #eee;
}

.order-item-name {
    flex: 1;
    font-weight: 500;
    color: #333;
    font-size: 14px;
}

.order-item-price {
    font-weight: 700;
    color: #ff7e5f;
    font-size: 14px;
}

/* Order footer */
.order-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #fafafa;
    border-top: 1px solid #f0f0f0;
    flex-wrap: wrap;
    gap: 8px;
}

.order-payment {
    font-size: 13px;
    color: #888;
}

.order-payment i { margin-right: 5px; }

.order-total {
    font-weight: 700;
    font-size: 16px;
    color: #333;
}

.order-total span {
    color: #ff7e5f;
}

footer {
    text-align: center;
    padding: 20px;
    background: #333;
    color: white;
    margin-top: 40px;
    font-size: 0.85em;
}

/* Responsive Design */
@media (max-width: 768px) {
    .header {
        padding: 20px 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }
    .back-btn {
        position: static;
        transform: none;
        align-self: flex-start;
    }
    
    .order-header {
        flex-direction: column;
        align-items: flex-start;
    }
    .order-status {
        margin-top: 10px;
    }
    
    .progress-steps span {
        font-size: 9px;
        text-align: center;
    }
    
    .order-item {
        flex-direction: column;
        align-items: flex-start;
    }
    .order-item img {
        width: 100%;
        height: 120px;
        margin-bottom: 10px;
    }
    
    .order-footer {
        flex-direction: column;
        align-items: flex-start;
    }
    .order-total {
        margin-top: 10px;
        align-self: flex-end;
    }
}
</style>
</head>
<body>

<div class="header">
    <a href="sales.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Shop</a>
    <h1><i class="fa-solid fa-truck"></i> My Orders</h1>
</div>

<div class="container" id="ordersContainer">
    <!-- Injected by JS -->
</div>

<footer>
    &copy; 2026 Trendy Threads. All rights reserved.
</footer>

<script>
function getShippingStatus(orderDate) {
    const placed = new Date(orderDate).getTime();
    const now = Date.now();
    const hoursElapsed = (now - placed) / 3600000;

    if (hoursElapsed < 0.5) return { status: 'Processing',        icon: 'fa-box',        color: '#ff9800', progress: 15  };
    if (hoursElapsed < 2)   return { status: 'Packed',            icon: 'fa-box-open',   color: '#2196F3', progress: 35  };
    if (hoursElapsed < 6)   return { status: 'Shipped',           icon: 'fa-truck',      color: '#9c27b0', progress: 55  };
    if (hoursElapsed < 24)  return { status: 'Out for Delivery',  icon: 'fa-truck-fast', color: '#ff5722', progress: 80  };
    return                         { status: 'Delivered',          icon: 'fa-circle-check',color: '#4CAF50', progress: 100 };
}

function renderOrders() {
    const user = AdminDB.getLoggedInUser();
    if (!user) {
        window.location.href = 'login.html?redirect=pro.html';
        return;
    }

    const container = document.getElementById('ordersContainer');
    const orders = user.orders || [];

    if (orders.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fa-solid fa-receipt"></i>
                <p>You haven't placed any orders yet.</p>
                <a href="sales.html"><i class="fa-solid fa-bag-shopping"></i> Start Shopping</a>
            </div>
        `;
        return;
    }

    let html = '';
    orders.forEach(order => {
        const s = getShippingStatus(order.date);
        const itemsHtml = (order.items || []).map(item => `
            <div class="order-item">
                <img src="${item.img || 'placeholder.jpg'}" alt="${item.name}" onerror="this.src='placeholder.jpg'">
                <div class="order-item-name">${item.name}</div>
                <div class="order-item-price">$${parseFloat(item.price || 0).toFixed(2)}</div>
            </div>
        `).join('');

        html += `
            <div class="order-card">
                <div class="order-header">
                    <div>
                        <div class="order-id"><i class="fa-solid fa-receipt"></i> ${order.id}</div>
                        <div class="order-date"><i class="fa-regular fa-calendar"></i> ${order.date}</div>
                    </div>
                    <div class="order-status" style="background: ${s.color};">
                        <i class="fa-solid ${s.icon}"></i> ${s.status}
                    </div>
                </div>

                <div class="progress-bar-container">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${s.progress}%; background: linear-gradient(90deg, ${s.color}, ${s.color}aa);"></div>
                    </div>
                    <div class="progress-steps">
                        <span class="${s.progress >= 15  ? 'active' : ''}">Processing</span>
                        <span class="${s.progress >= 35  ? 'active' : ''}">Packed</span>
                        <span class="${s.progress >= 55  ? 'active' : ''}">Shipped</span>
                        <span class="${s.progress >= 80  ? 'active' : ''}">Out for Delivery</span>
                        <span class="${s.progress >= 100 ? 'active' : ''}">Delivered</span>
                    </div>
                </div>

                <div class="order-items">${itemsHtml}</div>

                <div class="order-footer">
                    <div class="order-payment">
                        <i class="fa-solid fa-credit-card"></i> ${order.payment_method || 'GCash'}
                        &nbsp;|&nbsp;
                        <i class="fa-solid fa-truck"></i> Shipping: $5.00
                    </div>
                    <div class="order-total">Total: <span>$${parseFloat(order.total || 0).toFixed(2)}</span></div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
}

window.onload = renderOrders;
</script>

</body>
</html>

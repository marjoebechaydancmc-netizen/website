<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Trendy Threads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="admin_db.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #111827, #374151);
            /* Dark theme for admin */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            width: 420px;
            max-width: 95%;
            overflow: hidden;
        }

        .login-header {
            background: #1f2937;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .login-header p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
        }

        .tabs button {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #aaa;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tabs button.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .form-section {
            display: none;
            padding: 30px 25px;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: #555;
        }

        .form-group .input-wrap {
            position: relative;
        }

        .form-group .input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #2563eb;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .message {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.error {
            background: #ffe0e0;
            color: #d32f2f;
            display: block;
        }

        .message.success {
            background: #e0ffe0;
            color: #2e7d32;
            display: block;
        }

        /* Home Link */
        .back-home {
            display: block;
            text-align: center;
            padding: 15px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            background: #f8f9fa;
        }

        .back-home:hover {
            color: #2563eb;
            background: #e2e8f0;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <h1><i class="fa-solid fa-user-shield"></i> Admin Portal</h1>
            <p>Login or Register as Administrator</p>
        </div>

        <div class="tabs">
            <button id="tab-login-btn" class="active" onclick="switchTab('login')">
                <i class="fa-solid fa-right-to-bracket"></i> Log In
            </button>
            <button id="tab-signup-btn" onclick="switchTab('signup')">
                <i class="fa-solid fa-user-plus"></i> Register
            </button>
        </div>

        <!-- LOGIN FORM -->
        <div id="form-login" class="form-section active">
            <div id="login-message" class="message"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Admin Email</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Enter admin email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn"><i class="fa-solid fa-right-to-bracket"></i> Log In</button>
            </form>
        </div>

        <!-- SIGNUP FORM -->
        <div id="form-signup" class="form-section">
            <div id="signup-message" class="message"></div>
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="signup-name" placeholder="Enter your name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="Enter email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="signup-password" placeholder="Create a password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Admin Security Code <small>(default: ADMIN123)</small></label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-key"></i>
                        <input type="text" id="signup-code" placeholder="Enter security code" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn"><i class="fa-solid fa-user-shield"></i> Register Admin</button>
            </form>
        </div>

        <a href="index.html" class="back-home"><i class="fa-solid fa-house"></i> Return to Main Website</a>
    </div>

    <script>
        // Tab logic
        function switchTab(tab) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));

            document.getElementById('form-' + tab).classList.add('active');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
        }

        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.innerText = text;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }

        // Auth logic
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const loginMsg = 'login-message';

            const user = AdminDB.findUserByEmail(email);
            if (user && user.password === pass) {
                if (user.role === 'admin') {
                    AdminDB.setLoggedInUser(user);
                    location.href = 'admin.html';
                } else {
                    showMessage(loginMsg, 'Access Denied: This account is not an Admin account.', 'error');
                }
            } else {
                showMessage(loginMsg, 'Invalid email or password.', 'error');
            }
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-password').value;
            const code = document.getElementById('signup-code').value;
            const signupMsg = 'signup-message';

            if (code !== 'ADMIN123') {
                showMessage(signupMsg, 'Invalid Admin Security Code.', 'error');
                return;
            }

            const result = AdminDB.registerUser(name, email, pass);
            if (result.success) {
                AdminDB.setLoggedInUser(result.user);
                location.href = 'admin.html';
            } else {
                showMessage(signupMsg, result.message, 'error');
            }
        }

        // Handle URL tab param
        window.onload = function () {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab');
            if (tab === 'signup') switchTab('signup');
        };
    </script>

</body>

</html>
